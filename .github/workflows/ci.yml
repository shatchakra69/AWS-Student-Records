name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  app:
    name: App (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test

  terraform:
    name: Terraform (fmt + validate)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform fmt -check -recursive
      - run: terraform init -backend=false
      - run: terraform validate

  cloudformation:
    name: CloudFormation (cfn-lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install cfn-lint
      - run: cfn-lint cloudformation/student-records.yaml

  security:
    name: Security scan (tfsec, checkov, cfn-nag)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Report-only (soft fail) so findings are visible in logs without
      # breaking the build. Flip the soft-fail flags to enforce.
      - name: tfsec (Terraform)
        run: |
          curl -sSL https://github.com/aquasecurity/tfsec/releases/latest/download/tfsec-linux-amd64 -o tfsec
          chmod +x tfsec
          ./tfsec ./terraform --soft-fail
      - name: Checkov (IaC + Dockerfile)
        run: |
          pip install --quiet checkov
          checkov -d . --quiet --compact --soft-fail
      - name: cfn-nag (CloudFormation)
        run: |
          sudo gem install cfn-nag --no-document
          cfn_nag_scan --input-path cloudformation/student-records.yaml || true
